<!DOCTYPE html>
<html>
<head>
  <title>Job Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
  <style>
    .rejected {
      text-decoration: line-through;
      color: gray;
    }
    .offer {
      font-weight: bold;
      color: green;
    }
    .interview {
      font-weight: bold;
      color: blue;
    }
  </style>
</head>
<body class="container mt-4">
  <h1>Job Application Tracker</h1>
  <form id="loginForm" class="mb-3">
    <input type="email" id="email" placeholder="Enter your email" required class="form-control mb-2">
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <!-- Form to add a new job -->
  <form id="jobForm" class="mb-3" style="display:none;">
    <input type="text" id="company" placeholder="Company" required class="form-control mb-2">
    <input type="text" id="role" placeholder="Role" required class="form-control mb-2">
    <select id="status" class="form-control mb-2">
      <option value="Applied">Applied</option>
      <option value="Interview">Interview</option>
      <option value="Offer">Offer</option>
      <option value="Rejected">Rejected</option>
    </select>
    <button type="submit" class="btn btn-primary">Add Job</button>
  </form>

  <!-- List of jobs -->
  <ul id="jobList" class="list-group"></ul>

  <script src="script.js"></script>
</body>
</html>
